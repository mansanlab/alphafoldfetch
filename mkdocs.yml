# Project information
site_name: AlphaFoldFetch
site_description: Download AlphaFold structures from UniProt IDs or FASTA files
site_author: Edgar Manriquez-Sandoval
site_url: https://mansanlab.github.io/alphafoldfetch/
copyright: 'Copyright &copy; Edgar Manriquez-Sandoval 2024-present'

# Repository
repo_name: alphafoldfetch
repo_url: https://github.com/mansanlab/alphafoldfetch
edit_uri: blob/master/docs

# Navigation
nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Development: development.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - License: license.md
  - Authors: authors.md
  - Reference: reference/affetch/index.md

# Configuration
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github-alt
    logo: fontawesome/solid/dna
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs.sticky
    - content.code.copy

watch:
  - affetch
  - docs

plugins:
  search: {}
  autorefs: {}
  include-markdown: {}
  glightbox: {}
  minify:
    minify_html: true
  gen-files:
    scripts:
      - docs/scripts/gen_ref_nav.py
  section-index: {}
  mkdocstrings:
    default_handler: python
    handlers:
      python:
        paths:
          - .
        options:
          docstring_style: google
          show_submodules: false
          show_root_heading: true
          show_root_full_path: false
          show_if_no_docstring: true
          show_signature_annotations: true
          show_bases: false

markdown_extensions:
  - markdown.extensions.abbr:
  - markdown.extensions.admonition:
  - markdown.extensions.attr_list:
  - markdown.extensions.footnotes:
  - markdown.extensions.meta:
  - markdown.extensions.tables:
  - markdown.extensions.toc:
      permalink: true
  - pymdownx.details:
  - pymdownx.highlight:
      guess_lang: false
      linenums_style: pymdownx-inline
      use_pygments: true
  - pymdownx.inlinehilite:
  - pymdownx.keys:
  - pymdownx.magiclink:
      repo_url_shortener: true
      repo_url_shorthand: true
      social_url_shortener: true
      social_url_shorthand: true
      normalize_issue_symbols: true
      provider: github
      user: mansanlab
      repo: alphafoldfetch
  - pymdownx.snippets:
      check_paths: true
      base_path:
        - docs/snippets
      auto_append:
        - links.txt
  - pymdownx.superfences:
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/mansanlab/alphafoldfetch
